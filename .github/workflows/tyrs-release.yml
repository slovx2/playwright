name: Tyrs browser artifacts

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    if: startsWith(github.event.release.tag_name, 'tyrs-v')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24.14.0
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Test Tyrs extension and Core
        run: |
          npm run test-extension
          npm run tsc -- --pretty false
      - name: Build extension and Playwright Core artifacts
        run: npm run build-tyrs-artifacts -- out/tyrs-browser
      - name: Package signed CRX
        env:
          EXTENSION_SIGNING_KEY_B64: ${{ secrets.TYRS_BROWSER_EXTENSION_SIGNING_KEY_B64 }}
        run: |
          key_file="${RUNNER_TEMP}/tyrs-browser-extension.pem"
          trap 'rm -f "$key_file"' EXIT
          test -n "$EXTENSION_SIGNING_KEY_B64"
          printf '%s' "$EXTENSION_SIGNING_KEY_B64" | base64 --decode > "$key_file"
          chmod 0600 "$key_file"
          chrome=$(command -v google-chrome-stable || command -v google-chrome)
          node packages/extension/scripts/package-crx.mjs "$key_file" "$chrome" out/tyrs-browser
      - name: Upload release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$RELEASE_TAG" \
            out/tyrs-browser/tyrs-browser-extension.zip \
            out/tyrs-browser/tyrs-browser-extension.crx \
            out/tyrs-browser/playwright-core.tgz \
            out/tyrs-browser/playwright-artifacts.json \
            out/tyrs-browser/extension-release.json \
            --clobber
