name: "Issue triage (token isolation test)"

# TEST-ONLY variant of the triage workflow.
# Validates: COPILOT_GITHUB_TOKEN (instead of GH_TOKEN) + --enable-all-github-mcp-tools.
# Triggers on push to this test branch only. Does NOT post to the real issue.

on:
  push:
    branches: [skn0tt-triage-token-test]

concurrency:
  group: triage-token-test
  cancel-in-progress: false

permissions: {}

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      copilot-requests: write
    outputs:
      has_draft: ${{ steps.triage.outputs.has_draft }}
    env:
      ISSUE: "41573"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Triage issue with Copilot CLI
        id: triage
        env:
          COPILOT_GITHUB_TOKEN: ${{ github.token }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          mkdir -p output
          PROMPT=$(cat <<EOF
          You are validating token/MCP plumbing. Do EXACTLY these steps, then stop. Do not reproduce anything, do not post anything.

          1. Using ONLY the built-in GitHub MCP tools (github-mcp-server-*), NOT the gh CLI and NOT web fetch, read issue #$ISSUE in the ${{ github.repository }} repository. Write the issue's exact title on the first line of output/issue-title.txt and the name of the MCP tool you used on the second line.
          2. Run this shell command and write its raw stdout to output/env-check.txt: env | grep -iE 'token|github' | sed 's/=.*//' | sort
          3. Write one line to output/triage.md stating whether the MCP issue read succeeded.
          EOF
          )
          copilot \
            --allow-all-tools \
            --allow-all-paths \
            --no-ask-user \
            --enable-all-github-mcp-tools \
            --share=output/copilot-session.md \
            --model claude-opus-4.8 \
            --max-ai-credits 60 \
            -p "$PROMPT" \
            2>&1 | tee "output/copilot.log"

          if [ -s output/triage.md ]; then
            echo "has_draft=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_draft=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Show token isolation result in job summary
        if: always()
        run: |
          {
            echo "## Token isolation diagnostic (issue $ISSUE)"
            echo ''
            echo 'MCP issue read (title + tool used):'
            echo '```'
            cat "output/issue-title.txt" 2>/dev/null || echo "(issue-title.txt not produced)"
            echo '```'
            echo ''
            echo 'Env var NAMES visible to the copilot-spawned shell child:'
            echo '```'
            cat "output/env-check.txt" 2>/dev/null || echo "(env-check.txt not produced)"
            echo '```'
            echo ''
            echo '## Copilot run log'
            echo '```'
            cat "output/copilot.log" 2>/dev/null || echo "(no log)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: triage-token-test
          path: output/**
          if-no-files-found: warn
